<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fullfin — Confirmação de Pagamento</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F5F4F2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.10)}
    .icon{font-size:56px;margin-bottom:16px}
    .title{font-size:22px;font-weight:800;margin-bottom:8px}
    .sub{font-size:14px;color:#6B7280;line-height:1.6;margin-bottom:20px}
    .badge{display:inline-block;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:8px}
    .badge-green{background:#D1FAE5;color:#065F46}
    .badge-red{background:#FEE2E2;color:#991B1B}
    .badge-gray{background:#F3F4F6;color:#6B7280}
    .valor{font-size:32px;font-weight:800;margin:12px 0}
    .saldo-box{background:#F9FAFB;border-radius:12px;padding:14px;margin-top:16px}
    .saldo-label{font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
    .saldo-value{font-size:20px;font-weight:800;color:#1A1A2E}
    .footer{font-size:11px;color:#D1D5DB;margin-top:24px}
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="icon" id="icon">⏳</div>
  <div class="title" id="title">Carregando…</div>
  <div class="sub" id="sub"></div>
  <div id="extra"></div>
  <div class="footer">Fullfin · Sistema de controle financeiro</div>
</div>
<script>
  const fmt = v => parseFloat(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})
  const p = new URLSearchParams(location.search)
  const status = p.get('status')
  const valor  = p.get('valor')
  const saldo  = p.get('saldo')
  const acao   = p.get('acao')

  const el = id => document.getElementById(id)

  if(status === 'confirmado') {
    el('icon').textContent = '✅'
    el('title').textContent = 'Pagamento confirmado!'
    el('title').style.color = '#059669'
    el('sub').textContent = 'Obrigado por confirmar. O pagamento foi registrado com sucesso.'
    if(valor) el('extra').innerHTML = `
      <div class="badge badge-green">Valor confirmado</div>
      <div class="valor" style="color:#059669">${fmt(valor)}</div>
      ${saldo ? `<div class="saldo-box"><div class="saldo-label">Saldo devedor atualizado</div><div class="saldo-value">${fmt(saldo)}</div></div>` : ''}
    `
  } else if(status === 'contestado') {
    el('icon').textContent = '⚠️'
    el('title').textContent = 'Contestação registrada'
    el('title').style.color = '#DC2626'
    el('sub').textContent = 'Sua contestação foi registrada. Esdras receberá uma notificação e entrará em contato.'
    if(valor) el('extra').innerHTML = `
      <div class="badge badge-red">Valor contestado</div>
      <div class="valor" style="color:#DC2626">${fmt(valor)}</div>
    `
  } else if(status === 'ja_respondido') {
    el('icon').textContent = '🔁'
    el('title').textContent = 'Já respondido'
    el('sub').textContent = `Este pagamento já foi ${acao === 'confirmado' ? 'confirmado' : 'contestado'} anteriormente. Nenhuma ação foi realizada.`
    el('extra').innerHTML = `<div class="badge badge-gray">Status: ${acao||'respondido'}</div>`
  } else {
    el('icon').textContent = '❌'
    el('title').textContent = 'Link inválido'
    el('sub').textContent = 'Este link não é válido ou já expirou. Entre em contato com Esdras.'
    el('extra').innerHTML = `<div class="badge badge-gray">Link inválido</div>`
  }
</script>
</body>
</html>
